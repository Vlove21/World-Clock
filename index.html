<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock Project</title>
  </head>
  <body>
    <h1>World Clock</h1>
    <select name="location" id="">
        <option value="city">Choose a city</option>
        <option value="sydney">Sydney</option>
        <option value="detroit">Detroit</option>
        <option value="tokyo">Tokyo</option>
    </select>
    <hr>
    <div class="time-clock">
    <div class="city">Sydney</div>
    <span class="time">10:16:45 PM
    </span>
    <span class="date">April 5th, 2026</span>
    </div>
    <hr>
    <div class="time-clock">
    <div class="city">Detroit</div>
    <span class="time">6:36:15 PM
    </span>
    <span class="date">April 5th, 2026</span>
    </div>
    <hr>
    <footer>
      Code built by
      <a href="https://github.com/Vlove21" target="_blank"> Vonnie Love</a>,
      open-sourced on
      <a href="https://github.com/Vlove21/World-Clock" target="_blank">
        GitHub</a
      >, and hosted on
      <a href="https://loveworld-clock.netlify.app/" target="_blank">Netlfiy</a>
    </footer>
    <script src="src/script.js"></script>
  </body>
</html>
