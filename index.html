<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock Project</title>
  </head>
  <body>
    <h1>World Clock</h1>
    <div class="container">
      <select name="location" id="location" class="location">
        <option value="city">Choose a city</option>
        <option value="current">My Location</option>
        <option value="Australia/Sydney">Sydney</option>
        <option value="America/Detroit">Detroit</option>
        <option value="Asia/Tokyo">Tokyo</option>
        <option value="Asia/Seoul">Seoul</option>
        <option value="Africa/Accra">Accra</option>
        <option value="Canada/Newfoundland">Newfoundland</option>
        <option value="Europe/Paris">Paris</option>
        <option value="US/Hawaii">Hawaii</option>
      </select>
      <hr />
      <div id="cities">
        <div class="time-clock" id="sydney">
          <div class="city-info">
            <div class="city">
              Sydney🏜️
              <div class="date"></div>
            </div>
            <div class="time"></div>
          </div>
        </div>

        <div class="time-clock" id="detroit">
          <div class="city-info">
            <div class="city">
              Detroit 🏙️
              <div class="date"></div>
            </div>
            <div class="time"></div>
          </div>
        </div>
      </div>
    </div>
    <footer>
      Code built by
      <a href="https://github.com/Vlove21" target="_blank"> Vonnie Love</a>,
      open-sourced on
      <a href="https://github.com/Vlove21/World-Clock" target="_blank">
        GitHub</a
      >, and hosted on
      <a href="https://loveworld-clock.netlify.app/" target="_blank">Netlfiy</a>
    </footer>
    <script src="src/script.js"></script>
  </body>
</html>
